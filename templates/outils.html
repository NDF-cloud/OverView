<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outils - OverView</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            color: white;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: white;
        }

        .header p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1em;
        }

        .back-link {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }

        .tool-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.3s ease;
        }

        .tool-card:hover {
            transform: translateY(-5px);
        }

        .tool-card h2 {
            color: #667eea;
            font-size: 1.8em;
            margin-bottom: 20px;
            text-align: center;
        }

        /* Calculatrice */
        .calculator {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 300px;
            margin: 0 auto;
        }

        .calculator-display {
            grid-column: 1 / -1;
            background: #f8f9fa;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            padding: 15px;
            text-align: right;
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 15px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .calculator button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .calculator button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102,126,234,0.3);
        }

        .calculator button.operator {
            background: linear-gradient(135deg, #ffc107 0%, #ff8c00 100%);
        }

        .calculator button.equals {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        }

        .calculator button.clear {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
        }

        /* Calendrier */
        .calendar {
            max-width: 400px;
            margin: 0 auto;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-nav {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .calendar-nav:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102,126,234,0.3);
        }

        .calendar-title {
            font-size: 1.3em;
            font-weight: 600;
            color: #667eea;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .calendar-day-header {
            text-align: center;
            font-weight: 600;
            color: #667eea;
            padding: 10px;
            font-size: 0.9em;
        }

        .calendar-day {
            text-align: center;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .calendar-day:hover {
            background: rgba(102,126,234,0.1);
            border-color: #667eea;
        }

        .calendar-day.today {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
        }

        .calendar-day.other-month {
            color: #ccc;
        }

        .calendar-day.selected {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            font-weight: 600;
        }

        /* Mode sombre */
        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #ffffff;
        }

        body.dark-mode .tool-card {
            background: rgba(255, 255, 255, 0.1);
            color: #ecf0f1;
        }

        body.dark-mode .calculator-display {
            background: rgba(255, 255, 255, 0.1);
            color: #ecf0f1;
            border-color: #34495e;
        }

        body.dark-mode .calendar-day-header {
            color: #ecf0f1;
        }

        body.dark-mode .calendar-day.other-month {
            color: #7f8c8d;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .tools-grid {
                grid-template-columns: 1fr;
            }

            .calculator {
                max-width: 250px;
            }

            .calendar {
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="{{ url_for('app_with_tabs') }}" class="back-link">← Retour à l'accueil</a>

        <div class="header">
            <h1>🛠️ Outils</h1>
            <p>Calculatrice et calendrier pour vous aider dans votre gestion</p>
        </div>

        <div class="tools-grid">
            <!-- Calculatrice -->
            <div class="tool-card">
                <h2>🧮 Calculatrice</h2>
                <div class="calculator">
                    <div class="calculator-display" id="display">0</div>
                    <button class="clear" onclick="clearDisplay()">C</button>
                    <button class="operator" onclick="appendOperator('/')">/</button>
                    <button class="operator" onclick="appendOperator('*')">×</button>
                    <button onclick="appendNumber('7')">7</button>
                    <button onclick="appendNumber('8')">8</button>
                    <button onclick="appendNumber('9')">9</button>
                    <button class="operator" onclick="appendOperator('-')">-</button>
                    <button onclick="appendNumber('4')">4</button>
                    <button onclick="appendNumber('5')">5</button>
                    <button onclick="appendNumber('6')">6</button>
                    <button class="operator" onclick="appendOperator('+')">+</button>
                    <button onclick="appendNumber('1')">1</button>
                    <button onclick="appendNumber('2')">2</button>
                    <button onclick="appendNumber('3')">3</button>
                    <button class="equals" onclick="calculate()">=</button>
                    <button onclick="appendNumber('0')" style="grid-column: span 2;">0</button>
                    <button onclick="appendNumber('.')">.</button>
                </div>
            </div>

            <!-- Calendrier -->
            <div class="tool-card">
                <h2>📅 Calendrier</h2>
                <div class="calendar">
                    <div class="calendar-header">
                        <button class="calendar-nav" onclick="previousMonth()">‹</button>
                        <div class="calendar-title" id="calendar-title">Janvier 2024</div>
                        <button class="calendar-nav" onclick="nextMonth()">›</button>
                    </div>
                    <div class="calendar-grid" id="calendar-grid">
                        <!-- Le calendrier sera généré par JavaScript -->
                    </div>
                </div>
            </div>

            <!-- Registre de Caisse -->
            <div class="tool-card">
                <h2>💰 Registre de Caisse</h2>
                <div style="text-align: center; padding: 20px;">
                    <p style="margin-bottom: 20px; color: #666;">
                        Gérez vos entrées et sorties d'argent au quotidien pour votre entreprise.
                    </p>
                    <a href="{{ url_for('registre_caisse') }}"
                       style="display: inline-block; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                              color: white; padding: 15px 30px; border-radius: 12px; text-decoration: none;
                              font-weight: 600; transition: all 0.3s ease;">
                        📊 Ouvrir le Registre
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Variables pour la calculatrice
        let displayValue = '0';
        let previousValue = null;
        let operation = null;
        let waitingForOperand = false;

        // Variables pour le calendrier
        let currentDate = new Date();
        let selectedDate = new Date();

        // Initialisation
        document.addEventListener('DOMContentLoaded', function() {
            // Charger le thème
            const theme = localStorage.getItem('theme');
            if (theme === 'dark') {
                document.body.classList.add('dark-mode');
            }

            // Initialiser le calendrier
            renderCalendar();
        });

        // Fonctions de la calculatrice
        function updateDisplay() {
            document.getElementById('display').textContent = displayValue;
        }

        function appendNumber(number) {
            if (waitingForOperand) {
                displayValue = number;
                waitingForOperand = false;
            } else {
                displayValue = displayValue === '0' ? number : displayValue + number;
            }
            updateDisplay();
        }

        function appendOperator(operator) {
            const inputValue = parseFloat(displayValue);

            if (previousValue === null) {
                previousValue = inputValue;
            } else if (operation) {
                const result = calculate();
                displayValue = String(result);
                previousValue = result;
            }

            waitingForOperand = true;
            operation = operator;
            updateDisplay();
        }

        function calculate() {
            const inputValue = parseFloat(displayValue);

            if (previousValue === null || operation === null) {
                return inputValue;
            }

            let result;
            switch (operation) {
                case '+':
                    result = previousValue + inputValue;
                    break;
                case '-':
                    result = previousValue - inputValue;
                    break;
                case '*':
                    result = previousValue * inputValue;
                    break;
                case '/':
                    result = previousValue / inputValue;
                    break;
                default:
                    return inputValue;
            }

            displayValue = String(result);
            previousValue = null;
            operation = null;
            waitingForOperand = true;
            updateDisplay();
            return result;
        }

        function clearDisplay() {
            displayValue = '0';
            previousValue = null;
            operation = null;
            waitingForOperand = false;
            updateDisplay();
        }

        // Fonctions du calendrier
        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            // Mettre à jour le titre
            const monthNames = [
                'Janvier', 'Février', 'Mars', 'Avril', 'Mai', 'Juin',
                'Juillet', 'Août', 'Septembre', 'Octobre', 'Novembre', 'Décembre'
            ];
            document.getElementById('calendar-title').textContent = `${monthNames[month]} ${year}`;

            // Générer le calendrier
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startDate = new Date(firstDay);
            startDate.setDate(startDate.getDate() - firstDay.getDay());

            const calendarGrid = document.getElementById('calendar-grid');
            calendarGrid.innerHTML = '';

            // En-têtes des jours
            const dayNames = ['Dim', 'Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam'];
            dayNames.forEach(day => {
                const dayHeader = document.createElement('div');
                dayHeader.className = 'calendar-day-header';
                dayHeader.textContent = day;
                calendarGrid.appendChild(dayHeader);
            });

            // Jours du calendrier
            for (let i = 0; i < 42; i++) {
                const date = new Date(startDate);
                date.setDate(startDate.getDate() + i);

                const dayElement = document.createElement('div');
                dayElement.className = 'calendar-day';
                dayElement.textContent = date.getDate();

                // Vérifier si c'est aujourd'hui
                const today = new Date();
                if (date.toDateString() === today.toDateString()) {
                    dayElement.classList.add('today');
                }

                // Vérifier si c'est le mois précédent/suivant
                if (date.getMonth() !== month) {
                    dayElement.classList.add('other-month');
                }

                // Vérifier si c'est la date sélectionnée
                if (date.toDateString() === selectedDate.toDateString()) {
                    dayElement.classList.add('selected');
                }

                // Événement de clic
                dayElement.addEventListener('click', () => {
                    selectedDate = new Date(date);
                    renderCalendar();
                });

                calendarGrid.appendChild(dayElement);
            }
        }

        function previousMonth() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        }

        function nextMonth() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        }
    </script>
</body>
</html>
